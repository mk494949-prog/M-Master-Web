<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運M大師｜每日能量天氣掃描</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
:root {
  --gold:#D4AF37;--gold-light:#FFD700;--gold-dim:#9a7d1e;
  --cosmos:#050510;--cosmos-mid:#0d0d20;--cosmos-surface:#14142b;
  --text-bright:#f5f0e8;--text-dim:#a09070;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--cosmos);color:var(--text-bright);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
.cosmos-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(30,10,80,.5) 0%,rgba(5,5,16,1) 100%);}
.container{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:20px;text-align:center;}
header{padding:40px 0;}
.logo{font-family:'Cinzel Decorative',cursive;font-size:2.5rem;color:var(--gold);text-shadow:0 0 20px rgba(212,175,55,.5);margin-bottom:10px;}
.subtitle{font-size:.9rem;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;}
.scan-card{background:var(--cosmos-surface);border:1px solid rgba(212,175,55,.2);border-radius:30px;padding:40px 20px;margin-top:20px;box-shadow:0 20px 50px rgba(0,0,0,.5);backdrop-filter:blur(10px);}
.scanner-ui{position:relative;width:200px;height:200px;margin:0 auto 30px;}
.scan-circle{position:absolute;inset:0;border:2px solid var(--gold-dim);border-radius:50%;opacity:.3;}
.scan-bar{position:absolute;width:100%;height:2px;background:var(--gold-light);box-shadow:0 0 15px var(--gold-light);top:50%;left:0;transform:translateY(-50%);display:none;}
.btn-scan{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--cosmos);border:none;padding:15px 40px;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:.3s;box-shadow:0 10px 20px rgba(212,175,55,.3);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,175,55,0.7);}70%{box-shadow:0 0 0 15px rgba(212,175,55,0);}100%{box-shadow:0 0 0 0 rgba(212,175,55,0);}}
.result-area{display:none;margin-top:30px;text-align:left;animation:fadeIn 1s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.weather-tag{display:inline-block;padding:5px 15px;border-radius:50px;font-size:.8rem;margin-bottom:15px;font-weight:600;}
.weather-title{font-family:'Noto Serif TC',serif;font-size:1.8rem;margin-bottom:15px;color:var(--gold-light);}
.color-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px;border:1px solid rgba(255,255,255,0.3);}
.cta-box{margin-top:40px;padding:20px;border-top:1px solid rgba(212,175,55,.1);}
.btn-line{display:inline-block;width:100%;background:none;border:1px solid var(--gold);color:var(--gold);padding:12px;border-radius:10px;text-decoration:none;font-size:.9rem;transition:.3s;margin-top:15px;}
.btn-line:hover{background:var(--gold);color:var(--cosmos);}
.footer-mama{margin-top:60px;padding:40px 0;border-top:1px solid rgba(212,175,55,0.1);color:var(--text-dim);font-size:0.85rem;}
</style>
</head>
<body>
<div class="cosmos-bg"></div>
<div class="container">
  <header>
    <div class="logo">M-Master</div>
    <div class="subtitle">運M大師 · 能量天氣掃描</div>
  </header>
  <div class="scan-card">
    <div id="instruction">「靜心 3 秒，感應當下波動」</div>
    <div class="scanner-ui" id="scanner">
      <div class="scan-circle"></div>
      <div class="scan-bar" id="scanBar"></div>
      <canvas id="particleCanvas" style="position:absolute;inset:0;"></canvas>
    </div>
    <button class="btn-scan" id="scanBtn" onclick="startScan()">開始能量掃描</button>
    
    <div class="result-area" id="resultArea">
      <div id="weatherTag" class="weather-tag"></div>
      <h2 id="weatherTitle" class="weather-title"></h2>
      <p id="weatherDesc" style="color:var(--text-dim);line-height:1.6;margin-bottom:20px;"></p>
      
      <div style="background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;margin-bottom:20px;">
        <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:10px;">✦ 今日能量建議</div>
        <div id="outfitAdvice" style="margin-bottom:8px;font-size:0.95rem;"></div>
        <div id="foodAdvice" style="font-size:0.95rem;"></div>
      </div>

      <div id="quoteBlock" style="border-left:2px solid var(--gold);padding-left:15px;margin:25px 0;">
        <p id="quoteText" style="font-style:italic;color:var(--gold-light);"></p>
      </div>

      <div class="cta-box">
        <button class="btn-line" onclick="openLineConsult()">⚡ 諮詢專屬能量教練 (LINE)</button>
        <button class="btn-line" style="border-color:rgba(212,175,55,0.4);" onclick="shareResult()">✦ 分享我的能量天氣</button>
      </div>
    </div>
  </div>

  <footer class="footer-mama">
    <p>「大愛無疆，能量隨行」</p>
    <p style="margin-top:10px;font-size:0.75rem;opacity:0.6;">© 2026 M-Master AI. Powered by Magic Mama</p>
  </footer>
</div>

<script>
// ═══════════════════════════
// 1. 農曆與五行核心模組 (The Brain)
// ═══════════════════════════
const MasterLunar = {
    getDetail(date = new Date()) {
        const d = Solar.fromDate(date);
        const lunar = d.getLunar();
        return {
            lunarDate: `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`,
            ganZhi: `${lunar.getYearInGanZhi()}(${lunar.getYearShengXiao()})年`,
            eightWords: lunar.getEightChar(),
            jieQi: lunar.getJieQi() || "平氣"
        };
    },
    scanEnergy() {
        // 未來將接入真實資料庫運算，目前先以隨機模擬
        return {
            gold: Math.floor(Math.random() * 40) + 60, 
            wood: Math.floor(Math.random() * 100),
            water: Math.floor(Math.random() * 100),
            fire: Math.floor(Math.random() * 100),
            earth: Math.floor(Math.random() * 100)
        };
    }
};

// ═══════════════════════════
// 2. 能量天氣資料庫
// ═══════════════════════════
const energyFields = [
  { 
    code: 'TY', name: '天醫', color: '#D4AF37', weatherTitle: '極光時分 ✦ 財祿降臨', 
    weatherDesc: '磁場正處於高度擴張期，<em>適合進行決策與財富規劃</em>。',
    outfit: '亮金色、米白色', food: '溫性食材、蜂蜜水',
    quotes: ["大愛是吸引財富最快的頻率。","今日你的光芒將照亮他人。"]
  },
  { 
    code: 'SQ', name: '生氣', color: '#4CAF50', weatherTitle: '微雨轉晴 ✦ 貴人顯發', 
    weatherDesc: '能量流動順暢，適合<em>開啟對話與拓展人際</em>。',
    outfit: '嫩草綠、墨綠色', food: '新鮮蔬果、綠茶',
    quotes: ["溫柔的能量，能融化最堅硬的冰。","生命力正從你的內心萌芽。"]
  }
  // ... 其他磁場資料略
];

// ═══════════════════════════
// 3. 掃描邏輯與動畫
// ═══════════════════════════
let currentField = null;

function startScan() {
  const btn = document.getElementById('scanBtn');
  const bar = document.getElementById('scanBar');
  const inst = document.getElementById('instruction');
  const res = document.getElementById('resultArea');
  
  btn.style.display = 'none';
  res.style.display = 'none';
  bar.style.display = 'block';
  inst.textContent = '正在校準能量磁場...';

  let progress = 0;
  const timer = setInterval(() => {
    progress += 2;
    bar.style.top = progress + '%';
    if(progress === 30) inst.textContent = '感應內在波動中...';
    if(progress === 70) inst.textContent = '同步流日數據...';
    
    if(progress >= 100) {
      clearInterval(timer);
      finishScan();
    }
  }, 50);
}

function finishScan() {
  const info = MasterLunar.getDetail();
  console.log("掃描成功：", info);
  
  const field = energyFields[Math.floor(Math.random()*energyFields.length)];
  currentField = field;
  
  document.getElementById('scanBar').style.display = 'none';
  document.getElementById('instruction').textContent = '掃描完成：今日能量報告';
  document.getElementById('resultArea').style.display = 'block';
  
  // 渲染結果
  const tag = document.getElementById('weatherTag');
  tag.style.background = field.color;
  tag.style.color = '#fff';
  tag.textContent = field.name + ' 磁場';
  
  document.getElementById('weatherTitle').textContent = field.weatherTitle;
  document.getElementById('weatherDesc').innerHTML = field.weatherDesc;
  
  // 穿搭與飲食 (加上顏色小圓圈)
  document.getElementById('outfitAdvice').innerHTML = `<span class="color-dot" style="background:${field.color}"></span>建議色：${field.outfit}`;
  document.getElementById('foodAdvice').textContent = `🍵 能量飲食：${field.food}`;
  
  // 金句
  const randomQuote = field.quotes[Math.floor(Math.random()*field.quotes.length)];
  document.getElementById('quoteText').textContent = randomQuote;
  
  initParticles(field.color);
}

function initParticles(color) {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 200; canvas.height = 200;
  let particles = [];
  for(let i=0; i<30; i++) {
    particles.push({
      x: Math.random()*canvas.width, y: canvas.height+10,
      vx: (Math.random()-0.5)*2, vy: -(Math.random()*2+1),
      r: Math.random()*3+1, life: 1
    });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.life-=0.008;
      if(p.life<=0) return;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = color; ctx.globalAlpha = p.life*0.7;
      ctx.fill(); ctx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

function openLineConsult() {
  window.open('https://line.me/R/ti/p/@m-master', '_blank');
}

function shareResult() {
  const url = 'https://m-master1314.com/energy-scan';
  const text = `✨ 我剛完成了能量掃描！今日能量天氣：${currentField.weatherTitle} \n👉 免費測你的能量：${url}`;
  if(navigator.share) {
    navigator.share({title: '運M大師', text: text, url: url});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('分享文案已複製 ✦'));
  }
}
</script>
</body>
</html>
